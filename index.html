<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuentas Claras — Reparto de gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1EC;
  --surface:#FFFFFF;
  --ink:#1E2B27;
  --ink-soft:#5B6B65;
  --accent:#2F6F5E;
  --accent-soft:#E4EEEA;
  --accent-2:#C97A2B;
  --accent-2-soft:#F7E9D8;
  --danger:#B0473A;
  --danger-soft:#F6E4E1;
  --line:#D9DED8;
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:1040px;margin:0 auto;padding:24px 20px 80px;}

/* Header */
.masthead{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.masthead h1{font-family:var(--font-display);font-weight:700;font-size:34px;margin:0;letter-spacing:-0.01em;}
.masthead .tagline{font-family:var(--font-display);font-style:italic;font-size:14px;color:var(--ink-soft);}
.people-tag{font-size:13px;color:var(--ink-soft);font-family:var(--font-mono);}

/* Nav */
nav.tabs{display:flex;gap:4px;flex-wrap:wrap;margin:20px 0 24px;border-bottom:2px solid var(--line);padding-bottom:0;}
nav.tabs button{
  font-family:var(--font-body);font-weight:600;font-size:13.5px;color:var(--ink-soft);
  background:none;border:none;padding:10px 14px;cursor:pointer;border-radius:8px 8px 0 0;
  position:relative;top:2px;transition:color .15s, background .15s;
}
nav.tabs button:hover{color:var(--ink);background:var(--accent-soft);}
nav.tabs button.active{color:var(--accent);background:var(--surface);border:2px solid var(--line);border-bottom:2px solid var(--surface);}

.view{display:none;}
.view.active{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}

/* Month selector */
.month-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.month-bar button{
  background:var(--surface);border:1px solid var(--line);color:var(--ink);
  width:34px;height:34px;border-radius:8px;font-size:16px;cursor:pointer;
}
.month-bar button:hover{background:var(--accent-soft);border-color:var(--accent);}
.month-label{font-family:var(--font-display);font-weight:600;font-size:19px;min-width:170px;text-align:center;text-transform:capitalize;}
.month-label.clickable{cursor:pointer;border-bottom:2px dashed var(--accent);padding-bottom:2px;user-select:none;}
.month-label.clickable:hover{color:var(--accent);}

/* Month picker popover */
.month-picker-panel{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(30,43,39,.18);padding:14px;width:230px;font-family:var(--font-body);}
.mp-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-family:var(--font-mono);font-weight:600;font-size:15px;}
.mp-year-row button{width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--bg);cursor:pointer;}
.mp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.mp-grid button{padding:9px 4px;border:1px solid var(--line);background:var(--bg);border-radius:6px;font-size:12.5px;cursor:pointer;text-transform:capitalize;color:var(--ink);}
.mp-grid button:hover{background:var(--accent-soft);border-color:var(--accent);}
.mp-grid button.sel{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Ticket banner (signature element) */
.ticket{
  background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:26px 26px 20px;position:relative;margin-bottom:22px;
  box-shadow:0 1px 2px rgba(30,43,39,.04);
}
.ticket-edge{
  position:absolute;left:0;right:0;height:14px;background-color:var(--bg);
  background-image:radial-gradient(circle at 7px 7px, var(--bg) 7px, transparent 7.5px);
  background-size:14px 14px;background-repeat:repeat-x;background-position:0 center;
}
.ticket-edge.bottom{bottom:-7px;transform:rotate(180deg);}
.ticket-edge.top{top:-7px;}
.ticket .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);}
.ticket .balance-line{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-top:6px;}
.ticket .balance-amt{font-family:var(--font-mono);font-weight:600;font-size:38px;}
.ticket .balance-who{font-family:var(--font-body);font-size:15px;color:var(--ink-soft);}
.ticket.owe-them .balance-amt{color:var(--danger);}
.ticket.owe-you .balance-amt{color:var(--accent);}
.ticket.even .balance-amt{color:var(--ink-soft);}
.ticket .sub-stats{display:flex;gap:26px;margin-top:16px;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:14px;}
.stat{}
.stat .stat-label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.stat .stat-val{font-family:var(--font-mono);font-weight:600;font-size:17px;margin-top:2px;}

/* Cards / grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media (max-width:680px){.grid{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
.card h3{font-family:var(--font-display);font-size:16px;font-weight:600;margin:0 0 12px;}
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.cat-row:last-child{border-bottom:none;}
.cat-row .cat-name{color:var(--ink-soft);}
.cat-row .cat-amt{font-family:var(--font-mono);font-weight:600;}
.bar-track{background:var(--accent-soft);border-radius:4px;height:6px;margin-top:4px;overflow:hidden;}
.bar-fill{background:var(--accent);height:100%;border-radius:4px;}

.history-chart{display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:8px;}
.hist-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;height:100%;}
.hist-bar{width:100%;max-width:34px;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px;}
.hist-label{font-size:10.5px;color:var(--ink-soft);text-transform:capitalize;}

.diverging-chart{display:flex;gap:8px;margin-top:8px;}
.div-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0;border-radius:8px;padding:4px 2px 8px;}
.div-col.current{background:var(--accent-soft);}
.div-top{height:58px;display:flex;align-items:flex-end;justify-content:center;width:100%;}
.div-bottom{height:58px;display:flex;align-items:flex-start;justify-content:center;width:100%;}
.div-bar{width:60%;max-width:28px;border-radius:3px 3px 0 0;min-height:0;}
.div-bar.neg{border-radius:0 0 3px 3px;}
.div-bar.pos{background:var(--accent);}
.div-bar.neg{background:var(--danger);}
.div-baseline{height:2px;background:var(--line);width:100%;}
.div-label{font-size:10px;color:var(--ink-soft);margin-top:6px;text-transform:capitalize;text-align:center;}
.div-col.current .div-label{font-weight:700;color:var(--ink);}

/* Forms */
.section-title{font-family:var(--font-display);font-size:20px;font-weight:600;margin:0 0 4px;}
.section-hint{color:var(--ink-soft);font-size:13px;margin:0 0 16px;}
.form-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px;}
.form-card h3{margin-top:0;font-family:var(--font-display);font-size:16px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:4px;min-width:120px;flex:1;}
.field.small{flex:0 0 100px;min-width:100px;}
.field.date{flex:0 0 165px;min-width:165px;}
.field.wide{flex:2;min-width:200px;}
input[type="date"]{min-width:145px;}
.field label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
input,select{
  font-family:var(--font-body);font-size:14px;padding:8px 10px;border:1px solid var(--line);
  border-radius:8px;background:var(--bg);color:var(--ink);
}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;background:var(--surface);}
.btn{
  font-family:var(--font-body);font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:8px;
  border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;
}
.btn:hover{background:#265c4d;}
.btn.secondary{background:var(--surface);color:var(--accent);border:1px solid var(--accent);}
.btn.secondary:hover{background:var(--accent-soft);}
.btn.ghost{background:none;border:none;color:var(--ink-soft);font-weight:500;text-decoration:underline;padding:4px 6px;}
.btn.danger-ghost{background:none;border:none;color:var(--danger);font-weight:600;padding:4px 6px;cursor:pointer;}
.btn.small{padding:6px 10px;font-size:12.5px;}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);padding:8px 8px;border-bottom:2px solid var(--line);white-space:nowrap;}
tbody td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
tbody tr:last-child td{border-bottom:none;}
.amt-cell{font-family:var(--font-mono);font-weight:600;white-space:nowrap;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-top:4px;}
.tag.resp-5050{background:var(--accent-soft);color:var(--accent);}
.tag.resp-yo{background:var(--accent-2-soft);color:var(--accent-2);}
.tag.resp-hermano{background:var(--danger-soft);color:var(--danger);}
.tag.warn{background:var(--danger-soft);color:var(--danger);}
.tag.est{background:var(--accent-2-soft);color:var(--accent-2);}
.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin-bottom:20px;}
.empty-note{color:var(--ink-soft);font-size:13.5px;padding:20px 4px;text-align:center;font-style:italic;}
.row-actions{display:flex;gap:6px;white-space:nowrap;}

.toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;}
.toggle input{width:auto;}

.installment-progress{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);}
.usd-native{font-size:11px;color:var(--ink-soft);}
.forecast-cell{font-family:var(--font-mono);font-size:13px;}
.forecast-cell .empty{color:var(--line);}
.edit-row td{background:var(--accent-soft);}

footer.note{margin-top:36px;font-size:12px;color:var(--ink-soft);text-align:center;border-top:1px solid var(--line);padding-top:16px;}
.config-block{margin-bottom:20px;}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:13.5px;
  opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:250;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>

<body>
<div class="app" id="app">Cargando…</div>
<div class="toast" id="toast"></div>

<script>
/* ===================== ESTADO Y PERSISTENCIA ===================== */
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const STORAGE_KEYS = ['config','rentByMonth','servicesByMonth','cleaning','groceries','cardInstallments','cardAutodebits','monthlyExpenses','exchangeRates','settlements','cardCharges'];
const SERVICIOS_PREDEFINIDOS = ['Luz','Agua','Gas','Internet','Otro'];
const CATEGORIAS_MENSUALES = ['Verdulería','Lavadero','Supermercado (compra chica)','Pedidos de comida','Eventual','Otro'];

let state = {
  config: { yo:'Yo', hermano:'Hermano', updatedAt:0 },
  rentByMonth: {},
  servicesByMonth: {},
  cleaning: [],
  groceries: [],
  cardInstallments: [],
  cardAutodebits: [],
  monthlyExpenses: [],
  exchangeRates: {}, // { 'YYYY-MM': {value, updatedAt, deleted?} }
  settlements: [], // [{id, date, amount, direction, note, updatedAt, deleted?}]
  cardCharges: [] // consumos sueltos importados de un resumen (no son cuotas): {id, date, description, amount, paidBy, responsibility, updatedAt, deleted?}
};

let currentMonth = new Date().toISOString().slice(0,7);
let currentView = 'dashboard';

// variables de trabajo para selects de mes dentro de formularios (no van a storage)
let ciStartSelected = currentMonth;
let adPeriodMonthSelected = currentMonth;
let rateMonthSelected = currentMonth;
let settlementDateSelected = todayStr();
let adEditingId = null;
let ibMonthSelected = currentMonth;
let editSvcId = null;
let editCleanId = null;
let editGroId = null;
let editMeId = null;
let stmtItems = []; // items extraídos del resumen, pendientes de revisión
let stmtMonthSelected = currentMonth;
let stmtTotalDebited = '';
let stmtErrorMsg = '';

function uid(){ return 'id-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function now(){ return Date.now(); }

/* ===================== SINCRONIZACIÓN ENTRE HERMANOS (archivo JSON en GitHub) =====================
   No hay servidor propio: se usa un archivo JSON dentro de un repositorio de GitHub como
   base de datos compartida. Cada persona configura, UNA VEZ y solo en su propio navegador
   (no se sincroniza), el usuario/organización, el repositorio y un token personal
   (fine-grained PAT con permiso "Contents: Read and write" sobre ese repo nada más).
   Configuralo desde la pestaña Configuración → "Sincronizar con tu hermano (GitHub)".
   Si no lo configurás, la app sigue funcionando pero guarda los datos solo en este navegador.
*/
const GH_CONFIG_KEY = 'cuentas-claras-github-config';
const LS_STATE_KEY = 'cuentas-claras-state-local';
let githubConfig = null;
try{
  const rawCfg = localStorage.getItem(GH_CONFIG_KEY);
  if(rawCfg) githubConfig = JSON.parse(rawCfg);
}catch(e){ githubConfig = null; }

function githubConfigured(){
  return !!(githubConfig && githubConfig.owner && githubConfig.repo && githubConfig.token);
}
function githubDataPath(){
  return (githubConfig && githubConfig.path) ? githubConfig.path : 'datos.json';
}
function saveGithubConfig(cfg){
  githubConfig = cfg;
  localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
}
function clearGithubConfig(){
  githubConfig = null;
  localStorage.removeItem(GH_CONFIG_KEY);
}

async function githubApi(path, options={}){
  const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}${path}`;
  return fetch(url, {
    ...options,
    headers:{
      'Authorization': `Bearer ${githubConfig.token}`,
      'Accept': 'application/vnd.github+json',
      ...(options.headers||{})
    }
  });
}
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(b64){ return decodeURIComponent(escape(atob(b64))); }

async function githubLeerDatos(){
  const res = await githubApi(`/contents/${githubDataPath()}`);
  if(res.status===404) return { datos:null, sha:null };
  if(!res.ok) throw new Error('No se pudo leer de GitHub (HTTP '+res.status+'). Revisá usuario, repositorio y token.');
  const json = await res.json();
  const datos = JSON.parse(base64ToUtf8(json.content));
  return { datos, sha: json.sha };
}
async function githubEscribirDatos(datos, sha){
  const body = { message: 'Actualizar datos - ' + new Date().toISOString(), content: utf8ToBase64(JSON.stringify(datos, null, 2)) };
  if(sha) body.sha = sha;
  const res = await githubApi(`/contents/${githubDataPath()}`, { method:'PUT', body: JSON.stringify(body) });
  if(res.status===409){ const err = new Error('Conflicto: alguien escribió al mismo tiempo.'); err.conflict = true; throw err; }
  if(!res.ok){ const t = await res.text().catch(()=> ''); throw new Error('No se pudo guardar en GitHub (HTTP '+res.status+'). '+t.slice(0,200)); }
  const json = await res.json();
  return json.content.sha;
}

// --- Fusión: gana el registro con updatedAt más nuevo, no el archivo entero de una ---
function newerWins(remoteVal, localVal){
  const rT = (remoteVal && remoteVal.updatedAt) || 0;
  const lT = (localVal && localVal.updatedAt) || 0;
  if(remoteVal===undefined) return localVal;
  if(localVal===undefined) return remoteVal;
  return rT >= lT ? remoteVal : localVal;
}
function mergeById(remoteArr, localArr){
  remoteArr = remoteArr||[]; localArr = localArr||[];
  const byId = new Map();
  remoteArr.forEach(item=> byId.set(item.id, item));
  localArr.forEach(item=>{
    byId.set(item.id, byId.has(item.id) ? newerWins(byId.get(item.id), item) : item);
  });
  return Array.from(byId.values());
}
function mergeMapWithUpdatedAt(remoteMap, localMap){
  remoteMap = remoteMap||{}; localMap = localMap||{};
  const keys = new Set([...Object.keys(remoteMap), ...Object.keys(localMap)]);
  const out = {};
  keys.forEach(k=>{ out[k] = newerWins(remoteMap[k], localMap[k]); });
  return out;
}
function mergeServicesByMonth(remoteMap, localMap){
  remoteMap = remoteMap||{}; localMap = localMap||{};
  const keys = new Set([...Object.keys(remoteMap), ...Object.keys(localMap)]);
  const out = {};
  keys.forEach(k=>{ out[k] = mergeById(remoteMap[k], localMap[k]); });
  return out;
}
function mergeState(remote, local){
  if(!remote) return local;
  return {
    config: newerWins(remote.config, local.config),
    rentByMonth: mergeMapWithUpdatedAt(remote.rentByMonth, local.rentByMonth),
    servicesByMonth: mergeServicesByMonth(remote.servicesByMonth, local.servicesByMonth),
    cleaning: mergeById(remote.cleaning, local.cleaning),
    groceries: mergeById(remote.groceries, local.groceries),
    cardInstallments: mergeById(remote.cardInstallments, local.cardInstallments),
    cardAutodebits: mergeById(remote.cardAutodebits, local.cardAutodebits),
    monthlyExpenses: mergeById(remote.monthlyExpenses, local.monthlyExpenses),
    exchangeRates: mergeMapWithUpdatedAt(remote.exchangeRates, local.exchangeRates),
    settlements: mergeById(remote.settlements, local.settlements),
    cardCharges: mergeById(remote.cardCharges, local.cardCharges)
  };
}

async function syncPull(){
  const { datos: remote } = await githubLeerDatos();
  if(remote) state = mergeState(remote, state);
  return true;
}
async function syncPush(){
  for(let attempt=0; attempt<2; attempt++){
    try{
      const { datos: remote, sha } = await githubLeerDatos();
      if(remote) state = mergeState(remote, state);
      await githubEscribirDatos(state, sha);
      return true;
    }catch(e){
      if(attempt===1){ showToast('No se pudo guardar en GitHub: '+(e.message||e)); console.error(e); return false; }
      // primer intento falló (posible conflicto 409): reintenta una vez con datos frescos
    }
  }
  return false;
}
// Para "restaurar backup" y "borrar todo": sobrescribe sin fusionar con lo remoto
// (si fusionara, un ítem borrado localmente reaparecería porque remoto todavía lo tiene).
async function syncPushForce(){
  try{
    const { sha } = await githubLeerDatos();
    await githubEscribirDatos(state, sha);
    return true;
  }catch(e){
    showToast('No se pudo guardar en GitHub: '+(e.message||e));
    console.error(e);
    return false;
  }
}

async function loadAll(){
  if(githubConfigured()){
    try{
      await syncPull();
    }catch(e){
      console.error(e);
      showToast('No se pudo conectar con GitHub. Revisá la configuración en "Configuración".');
    }
  } else if(USE_NATIVE_STORAGE){
    for(const key of STORAGE_KEYS){
      try{
        const res = await window.storage.get(key, true);
        if(res && res.value!==undefined) state[key] = JSON.parse(res.value);
      }catch(e){ /* no existe todavía */ }
    }
  } else {
    try{
      const raw = localStorage.getItem(LS_STATE_KEY);
      if(raw) state = JSON.parse(raw);
    }catch(e){ /* sin datos locales todavía */ }
  }
  migrateAutodebits();
  migrateExchangeRates();
  migrateCardCharges();
}
function migrateAutodebits(){
  state.cardAutodebits = (state.cardAutodebits||[]).map(a=>{
    if(a.periods) return a;
    return { id:a.id, description:a.description, type:a.type, active:a.active, updatedAt: a.updatedAt||now(),
      periods:[{ startMonth:'2000-01', amount:a.amount, currency:a.currency||'ARS' }] };
  });
}
function migrateExchangeRates(){
  const out = {};
  Object.entries(state.exchangeRates||{}).forEach(([k,v])=>{
    out[k] = (v && typeof v==='object' && 'value' in v) ? v : { value:v, updatedAt: now() };
  });
  state.exchangeRates = out;
}
function migrateCardCharges(){
  // Versiones anteriores importaban el resumen como "Gastos mensuales" (categoría "Tarjeta (resumen)").
  // Los pasamos a su propia lista para que vivan solo en la pestaña Tarjeta.
  if(!state.cardCharges) state.cardCharges = [];
  (state.monthlyExpenses||[]).forEach(m=>{
    if(m.category==='Tarjeta (resumen)' && !m.deleted){
      if(!state.cardCharges.some(c=>c.id===m.id)){
        state.cardCharges.push({ id:m.id, date:m.date, description:m.description, amount:m.amount,
          paidBy:m.paidBy, responsibility:m.responsibility, updatedAt:m.updatedAt||now() });
      }
      m.deleted = true;
      m.updatedAt = now();
    }
  });
}

const USE_NATIVE_STORAGE = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get==='function');

async function saveKey(key){
  if(githubConfigured()){
    return await syncPush();
  }
  if(USE_NATIVE_STORAGE){
    try{
      const res = await window.storage.set(key, JSON.stringify(state[key]), true);
      if(!res) showToast('No se pudo guardar. Probá de nuevo.');
      return !!res;
    }catch(e){ showToast('No se pudo guardar el cambio.'); console.error(e); return false; }
  }
  try{
    localStorage.setItem(LS_STATE_KEY, JSON.stringify(state));
    return true;
  }catch(e){
    showToast('No se pudo guardar en este navegador.');
    return false;
  }
}
// Igual que saveKey, pero para "restaurar backup" / "borrar todo": no fusiona con lo remoto.
async function persistForce(){
  if(githubConfigured()) return await syncPushForce();
  if(USE_NATIVE_STORAGE){
    let ok = true;
    for(const k of STORAGE_KEYS){
      try{ const res = await window.storage.set(k, JSON.stringify(state[k]), true); if(!res) ok=false; }
      catch(e){ ok=false; }
    }
    if(!ok) showToast('No se pudo guardar. Probá de nuevo.');
    return ok;
  }
  try{
    localStorage.setItem(LS_STATE_KEY, JSON.stringify(state));
    return true;
  }catch(e){
    showToast('No se pudo guardar en este navegador.');
    return false;
  }
}

function formatMonth(key){
  const [y,m] = key.split('-').map(Number);
  return `${MESES[m-1]} ${y}`;
}
function formatMonthShort(key){
  const [y,m] = key.split('-').map(Number);
  return `${MESES[m-1].slice(0,3)} ${String(y).slice(2)}`;
}
function addMonths(key, n){
  let [y,m] = key.split('-').map(Number);
  m += n;
  while(m>12){ m-=12; y++; }
  while(m<1){ m+=12; y--; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
function formatMoney(n){
  n = Number(n)||0;
  return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
}
function formatUsd(n){
  n = Number(n)||0;

}

/* ===================== MODELO DE REPARTO ===================== */
// responsibility: '50-50' | 'yo-100' | 'hermano-100'
function typeToResp(type){
  if(type==='yo') return 'yo-100';
  if(type==='hermano') return 'hermano-100';
  return '50-50';
}
function respLabel(resp){
  const n = state.config;
  if(resp==='50-50') return '50/50';
  if(resp==='yo-100') return `100% ${n.yo}`;
  return `100% ${n.hermano}`;
}
function respTagClass(resp){
  if(resp==='50-50') return 'resp-5050';
  if(resp==='yo-100') return 'resp-yo';
  return 'resp-hermano';
}
function computeShare(amount, paidBy, responsibility){
  amount = Number(amount)||0;
  let owedYo=0, owedHermano=0;
  if(responsibility==='50-50'){ owedYo = amount/2; owedHermano = amount/2; }
  else if(responsibility==='yo-100'){ owedYo = amount; }
  else { owedHermano = amount; }
  const paidYo = paidBy==='yo' ? amount : 0;
  const paidHermano = paidBy==='hermano' ? amount : 0;
  return { owedYo, owedHermano, paidYo, paidHermano };
}
function getInstallmentMonths(ci){
  const months = [];
  for(let i=0;i<ci.numInstallments;i++) months.push(addMonths(ci.startMonth, i));
  return months;
}
function currentPeriodFor(periods, monthKey){
  // Devuelve el período vigente para ese mes. Si el mes es anterior al primer
  // período cargado, devuelve null: el débito automático no corre "hacia atrás".
  const sorted = [...periods].sort((x,y)=> x.startMonth.localeCompare(y.startMonth));
  let applicable = null;
  for(const p of sorted){ if(p.startMonth<=monthKey) applicable = p; }
  return applicable;
}

/* ===================== DETECCIÓN DE CUOTAS AL IMPORTAR UN RESUMEN ===================== */
// Reconoce formatos tipo "(cuota 3/6)", "(cuota 3 de 6)" o el propio del resumen "C.03/06".
function parseCuotaInfo(description){
  const patterns = [
    /\(?\s*cuota\s*(\d+)\s*(?:\/|de)\s*(\d+)\s*\)?/i,
    /\bC\.?\s*(\d{1,2})\s*\/\s*(\d{1,2})\b/i
  ];
  for(const re of patterns){
    const m = description.match(re);
    if(m){
      const idx = parseInt(m[1],10), total = parseInt(m[2],10);
      if(idx>=1 && total>=1 && idx<=total){
        const cleanDesc = description.replace(re,'').replace(/\s{2,}/g,' ').trim().replace(/[-–—,]\s*$/,'').trim();
        return { idx, total, cleanDesc: cleanDesc || description.trim() };
      }
    }
  }
  return null;
}
function normalizeDesc(s){ return String(s||'').toLowerCase().trim().replace(/\s+/g,' '); }
// Busca una cuota ya cargada que corresponda al mismo concepto, para no duplicarla al reimportar
// el resumen del mes siguiente.
function findMatchingInstallment(cleanDesc, numInstallments, targetMonth, cuotaIdx){
  return state.cardInstallments.find(ci=>{
    if(ci.deleted) return false;
    if(Number(ci.numInstallments)!==Number(numInstallments)) return false;
    if(normalizeDesc(ci.description)!==normalizeDesc(cleanDesc)) return false;
    const months = getInstallmentMonths(ci);
    return months[cuotaIdx-1]===targetMonth;
  });
}

/* ===================== COTIZACIÓN USD ===================== */
function getRateForMonth(monthKey){
  const entry = state.exchangeRates[monthKey];
  if(entry && !entry.deleted) return { rate: entry.value, estimated:false };
  const keys = Object.keys(state.exchangeRates).filter(k=> state.exchangeRates[k] && !state.exchangeRates[k].deleted);
  if(!keys.length) return null;
  const before = keys.filter(k=>k<monthKey).sort().pop();
  if(before) return { rate: state.exchangeRates[before].value, estimated:true };
  const after = keys.filter(k=>k>monthKey).sort()[0];
  if(after) return { rate: state.exchangeRates[after].value, estimated:true };
  return null;
}
function toARS(amount, currency, monthKey){
  amount = Number(amount)||0;
  if(currency!=='USD') return { value:amount, estimated:false, noRate:false };
  const r = getRateForMonth(monthKey);
  if(!r) return { value:0, estimated:true, noRate:true };
  return { value: amount*r.rate, estimated:r.estimated, noRate:false };
}

/* ===================== ITEMS DE TARJETA POR MES ===================== */
function cardItemsForMonth(monthKey){
  const list = [];
  state.cardInstallments.filter(ci=>!ci.deleted).forEach(ci=>{
    const months = getInstallmentMonths(ci);
    const idx = months.indexOf(monthKey);
    if(idx>=0){
      const nativeAmt = Number(ci.totalAmount)/Number(ci.numInstallments);
      const currency = ci.currency||'ARS';
      const conv = toARS(nativeAmt, currency, monthKey);
      list.push({ kind:'cuota', id:ci.id, label:ci.description, sub:`cuota ${idx+1}/${ci.numInstallments}`,
        nativeAmt, currency, arsAmt:conv.value, estimated:conv.estimated, noRate:conv.noRate,
        responsibility: typeToResp(ci.type) });
    }
  });
  state.cardAutodebits.filter(a=>a.active && !a.deleted).forEach(a=>{
    const period = currentPeriodFor(a.periods, monthKey);
    if(!period) return;
    const currency = period.currency||'ARS';
    const conv = toARS(period.amount, currency, monthKey);
    list.push({ kind:'autodebito', id:a.id, label:a.description, sub:'débito automático',
      nativeAmt:Number(period.amount), currency, arsAmt:conv.value, estimated:conv.estimated, noRate:conv.noRate,
      responsibility: typeToResp(a.type) });
  });
  return list;
}

function nativeCardAmountsForMonth(monthKey){
  let sumArs = 0, sumUsd = 0;
  state.cardInstallments.filter(ci=>!ci.deleted).forEach(ci=>{
    const months = getInstallmentMonths(ci);
    const idx = months.indexOf(monthKey);
    if(idx>=0){
      const nativeAmt = Number(ci.totalAmount)/Number(ci.numInstallments);
      if((ci.currency||'ARS')==='USD') sumUsd += nativeAmt; else sumArs += nativeAmt;
    }
  });
  state.cardAutodebits.filter(a=>a.active && !a.deleted).forEach(a=>{
    const period = currentPeriodFor(a.periods, monthKey);
    if(!period) return;
    if((period.currency||'ARS')==='USD') sumUsd += Number(period.amount); else sumArs += Number(period.amount);
  });
  return { sumArs, sumUsd };
}

/* ===================== IMPORTAR RESUMEN (parseo local, sin red) ===================== */
function parseArgNumber(str){
  str = String(str).trim().replace(/[^\d.,-]/g,'');
  if(str==='') return NaN;
  const hasComma = str.includes(',');
  const hasDot = str.includes('.');
  if(hasComma && hasDot){
    str = str.replace(/\./g,'').replace(',', '.');
  } else if(hasComma && !hasDot){
    str = str.replace(',', '.');
  }
  return parseFloat(str);
}
function parseStatementLines(text){
  const lines = String(text).split('\n').map(l=>l.trim()).filter(l=>l.length);
  const items = [];
  const skipped = [];
  for(const line of lines){
    let parts = line.split('|');
    if(parts.length<2) parts = line.split(';');
    if(parts.length<2) parts = line.split('\t');
    if(parts.length<2){ skipped.push(line); continue; }
    const description = parts[0].trim();
    const amount = parseArgNumber(parts[1]);
    if(!description || !isFinite(amount) || amount<=0){ skipped.push(line); continue; }
    const currencyRaw = (parts[2]||'ARS').trim().toUpperCase();
    const currency = /USD|U\$S|DOLAR/.test(currencyRaw) ? 'USD' : 'ARS';
    items.push({ description, amount, currency });
  }
  return { items, skipped };
}
function getMonthItems(monthKey){
  const items = [];
  const rent = state.rentByMonth[monthKey];
  if(rent && !rent.deleted) items.push({category:'Alquiler', description:'Alquiler', amount:rent.amount, paidBy:rent.paidBy, responsibility:rent.responsibility});

  (state.servicesByMonth[monthKey]||[]).filter(s=>!s.deleted).forEach(s=>{
    items.push({category:'Servicios', description:s.name, amount:s.amount, paidBy:s.paidBy, responsibility:s.responsibility});
  });

  state.cleaning.filter(c=>!c.deleted && c.date.slice(0,7)===monthKey).forEach(c=>{
    items.push({category:'Limpieza', description:`Limpieza (${c.date})`, amount:c.amount, paidBy:c.paidBy, responsibility:c.responsibility});
  });

  state.groceries.filter(g=>!g.deleted && g.date.slice(0,7)===monthKey).forEach(g=>{
    const desc = g.description||'Ticket supermercado';
    const dedYo = Number(g.dedYo)||0;
    const dedHermano = Number(g.dedHermano)||0;
    if(dedYo>0 || dedHermano>0){
      const remainder = Number(g.total) - dedYo - dedHermano;
      if(remainder>0){
        items.push({category:'Supermercado', description:`${desc} (parte compartida)`, amount:remainder, paidBy:g.paidBy, responsibility:g.responsibility});
      }
      if(dedYo>0) items.push({category:'Supermercado', description:`${desc} (100% ${state.config.yo})`, amount:dedYo, paidBy:g.paidBy, responsibility:'yo-100'});
      if(dedHermano>0) items.push({category:'Supermercado', description:`${desc} (100% ${state.config.hermano})`, amount:dedHermano, paidBy:g.paidBy, responsibility:'hermano-100'});
    } else {
      items.push({category:'Supermercado', description:desc, amount:g.total, paidBy:g.paidBy, responsibility:g.responsibility});
    }
  });

  cardItemsForMonth(monthKey).forEach(ci=>{
    let note = '';
    if(ci.currency==='USD'){
      note = ci.noRate ? ' (US$ '+ci.nativeAmt.toLocaleString('es-AR')+' — sin cotización cargada)'
           : ci.estimated ? ' (US$ '+ci.nativeAmt.toLocaleString('es-AR')+' — estimado)'
           : ' (US$ '+ci.nativeAmt.toLocaleString('es-AR')+')';
    }
    items.push({
      category: ci.kind==='cuota' ? 'Tarjeta (cuota)' : 'Tarjeta (débito automático)',
      description: `${ci.label} — ${ci.sub}${note}`,
      amount: ci.arsAmt, paidBy:'yo', responsibility: ci.responsibility
    });
  });

  state.monthlyExpenses.filter(m=>!m.deleted && m.date.slice(0,7)===monthKey).forEach(m=>{
    items.push({category:m.category||'Gastos mensuales', description:m.description, amount:m.amount, paidBy:m.paidBy, responsibility:m.responsibility});
  });

  (state.cardCharges||[]).filter(c=>!c.deleted && c.date.slice(0,7)===monthKey).forEach(c=>{
    items.push({category:'Tarjeta (resumen)', description:c.description, amount:c.amount, paidBy:c.paidBy, responsibility:c.responsibility});
  });

  return items;
}
function summarize(items){
  let total=0, owedYo=0, owedHermano=0, paidYo=0, paidHermano=0;
  const byCategory = {};
  items.forEach(it=>{
    const s = computeShare(it.amount, it.paidBy, it.responsibility);
    total += Number(it.amount)||0;
    owedYo += s.owedYo; owedHermano += s.owedHermano;
    paidYo += s.paidYo; paidHermano += s.paidHermano;
    byCategory[it.category] = (byCategory[it.category]||0) + (Number(it.amount)||0);
  });
  const netYo = paidYo - owedYo;
  return { total, owedYo, owedHermano, paidYo, paidHermano, netYo, byCategory };
}

/* ===================== AJUSTES / PAGOS ENTRE HERMANOS ===================== */
function settlementNetForMonth(monthKey){
  // positivo: suma a favor de "yo" (reduce lo que hermano debe si es pago de hermano a yo, etc.)
  return state.settlements.filter(s=>!s.deleted && s.date.slice(0,7)===monthKey).reduce((acc,s)=>{
    return acc + (s.direction==='hermano-to-yo' ? -s.amount : s.amount);
  },0);
}
function monthNetYo(monthKey){
  return summarize(getMonthItems(monthKey)).netYo + settlementNetForMonth(monthKey);
}
function getEarliestMonth(){
  const months = [];
  months.push(...Object.keys(state.rentByMonth));
  months.push(...Object.keys(state.servicesByMonth));
  months.push(...state.cleaning.map(c=>c.date.slice(0,7)));
  months.push(...state.groceries.map(g=>g.date.slice(0,7)));
  months.push(...state.monthlyExpenses.map(m=>m.date.slice(0,7)));
  months.push(...state.cardInstallments.map(ci=>ci.startMonth));
  state.cardAutodebits.forEach(a=> (a.periods||[]).forEach(p=>months.push(p.startMonth)));
  months.push(...state.settlements.map(s=>s.date.slice(0,7)));
  if(!months.length) return currentMonth;
  return months.sort()[0];
}
function cumulativeNetYo(uptoMonth){
  const start = getEarliestMonth();
  let total = 0, m = start, guard = 0;
  while(m<=uptoMonth && guard<600){
    total += monthNetYo(m);
    m = addMonths(m,1);
    guard++;
  }
  return total;
}

  function ticketInfo(value){
    if(value > 0.5) return { cls:'owe-them', text:`${n.hermano} le debe a ${n.yo}` };
    if(value < -0.5) return { cls:'owe-you', text:`${n.yo} le debe a ${n.hermano}` };
    return { cls:'even', text:'Están a mano' };
  }
  const monthInfo = ticketInfo(monthNet);
  const totalInfo = ticketInfo(totalNet);

  const catRows = Object.entries(s.byCategory).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
    const pct = s.total? Math.round(amt/s.total*100) : 0;
    return `<div class="cat-row"><span class="cat-name">${escapeHtml(cat)}</span><span class="cat-amt">${formatMoney(amt)}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
  }).join('') || `<div class="empty-note">Todavía no cargaste gastos este mes.</div>`;

  // Gráfico divergente: 3 meses atrás, el actual, y 3 meses hacia adelante
  const chartMonths = [];
  for(let i=-3;i<=3;i++) chartMonths.push(addMonths(currentMonth,i));
  const chartValues = chartMonths.map(m=> monthNetYo(m));
  const maxAbs = Math.max(1, ...chartValues.map(v=>Math.abs(v)));
  const divCols = chartMonths.map((m,i)=>{
    const v = chartValues[i];
    const posH = v>0 ? Math.max(Math.round(Math.abs(v)/maxAbs*100),4) : 0;
    const negH = v<0 ? Math.max(Math.round(Math.abs(v)/maxAbs*100),4) : 0;
    return `<div class="div-col ${m===currentMonth?'current':''}" title="${formatMonth(m)}: ${formatMoney(v)}">
      <div class="div-top"><div class="div-bar pos" style="height:${posH}%"></div></div>
      <div class="div-baseline"></div>
      <div class="div-bottom"><div class="div-bar neg" style="height:${negH}%"></div></div>
      <div class="div-label">${MESES[Number(m.split('-')[1])-1].slice(0,3)}</div>
    </div>`;
  }).join('');

  const settlements = state.settlements.filter(st=>!st.deleted).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);

  el.innerHTML = `
    ${monthBarHtml()}
    <div class="ticket ${monthInfo.cls}">
      <div class="ticket-edge top"></div>
      <div class="eyebrow">Balance de ${formatMonth(currentMonth)}</div>
      <div class="balance-line">
        <div class="balance-amt">${formatMoney(Math.abs(monthNet))}</div>
        <div class="balance-who">${monthInfo.text}${Math.abs(monthNet)<0.5?' este mes':''}</div>
      </div>
      <div class="sub-stats">
        <div class="stat"><div class="stat-label">Gastado total del mes</div><div class="stat-val">${formatMoney(s.total)}</div></div>
        <div class="stat"><div class="stat-label">Pagó ${escapeHtml(n.yo)}</div><div class="stat-val">${formatMoney(s.paidYo)}</div></div>
        <div class="stat"><div class="stat-label">Pagó ${escapeHtml(n.hermano)}</div><div class="stat-val">${formatMoney(s.paidHermano)}</div></div>
      </div>
      <div class="ticket-edge bottom"></div>
    </div>

    <div class="ticket ${totalInfo.cls}" style="padding-top:18px;padding-bottom:14px;">
      <div class="eyebrow">Balance total acumulado (hasta ${formatMonth(currentMonth)})</div>
      <div class="balance-line">
        <div class="balance-amt" style="font-size:28px;">${formatMoney(Math.abs(totalNet))}</div>
        <div class="balance-who">${totalInfo.text}${Math.abs(totalNet)<0.5?' en total':''}</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Por categoría este mes</h3>
        ${catRows}
      </div>
      <div class="card">
        <h3>Balance mes a mes</h3>
        <div class="diverging-chart">${divCols}</div>
      </div>
    </div>

    <div class="form-card">
      <h3>Ajustes y pagos entre ${escapeHtml(n.yo)} y ${escapeHtml(n.hermano)}</h3>
      <p class="section-hint">Registrá acá cuando uno le transfiere plata al otro para saldar cuentas — impacta directamente en el balance acumulado.</p>
      <div class="form-row">
        <div class="field date"><label>Fecha</label><input type="date" id="stl-date" value="${todayStr()}"></div>
        <div class="field wide"><label>¿Quién le pagó a quién?</label>
          <select id="stl-direction">
            <option value="hermano-to-yo">${escapeHtml(n.hermano)} le pagó a ${escapeHtml(n.yo)}</option>
            <option value="yo-to-hermano">${escapeHtml(n.yo)} le pagó a ${escapeHtml(n.hermano)}</option>
          </select>
        </div>
        <div class="field"><label>Monto</label><input type="number" min="0" step="0.01" id="stl-amount" placeholder="0"></div>
        <div class="field wide"><label>Nota (opcional)</label><input type="text" id="stl-note" placeholder="Ej: transferencia, efectivo…"></div>
        <div class="field small"><button class="btn" id="stl-add">Agregar</button></div>
      </div>
      ${settlements.length ? `
      <div class="table-wrap" style="margin-top:14px;margin-bottom:0;">
        <table>
          <thead><tr><th>Fecha</th><th>Movimiento</th><th>Monto</th><th>Nota</th><th></th></tr></thead>
          <tbody>
            ${settlements.map(st=>`
              <tr>
                <td>${st.date}</td>
                <td>${st.direction==='hermano-to-yo' ? escapeHtml(n.hermano)+' → '+escapeHtml(n.yo) : escapeHtml(n.yo)+' → '+escapeHtml(n.hermano)}</td>
                <td class="amt-cell">${formatMoney(st.amount)}</td>
                <td>${escapeHtml(st.note||'—')}</td>
                <td class="row-actions"><button class="btn danger-ghost" data-del-stl="${st.id}">Eliminar</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    </div>
  `;
  bindMonthBar(renderDashboard);

  document.getElementById('stl-add').onclick = ()=>{
    const date = document.getElementById('stl-date').value;
    const amount = parseFloat(document.getElementById('stl-amount').value);
    if(!date){ showToast('Elegí una fecha.'); return; }
    if(!amount || amount<=0){ showToast('Ingresá un monto válido.'); return; }
    state.settlements.push({
      id:uid(), date, amount,
      direction: document.getElementById('stl-direction').value,
      note: document.getElementById('stl-note').value.trim(),
      updatedAt: now()
    });
    saveKey('settlements');
    showToast('Ajuste registrado.');
    renderDashboard();
  };
  el.querySelectorAll('[data-del-stl]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = state.settlements.find(st=>st.id===btn.dataset.delStl);
      if(item){ item.deleted = true; item.updatedAt = now(); }
      saveKey('settlements');
      renderDashboard();
    };
  });
}

/* ===================== ALQUILER Y SERVICIOS ===================== */
function renderAlquiler(){
  const el = document.getElementById('view-alquiler');
  const rent = (state.rentByMonth[currentMonth] && !state.rentByMonth[currentMonth].deleted) ? state.rentByMonth[currentMonth] : {amount:'', paidBy:'yo', responsibility:'50-50'};
  const services = (state.servicesByMonth[currentMonth] || []).filter(s=>!s.deleted);
  const prevMonth = addMonths(currentMonth,-1);
  const hasPrev = state.rentByMonth[prevMonth] || (state.servicesByMonth[prevMonth]||[]).length;

  el.innerHTML = `
    ${monthBarHtml()}
    <p class="section-hint">Cargá el alquiler y los servicios (luz, agua, gas, internet, etc.) de este mes.</p>

    <div class="form-card">
      <h3>Alquiler</h3>
      <div class="form-row">
        <div class="field wide"><label>Monto</label><input type="number" min="0" step="0.01" id="rent-amount" value="${rent.amount}" placeholder="0"></div>
        <div class="field"><label>Pagó</label>${paidBySelect('rent-paidby', rent.paidBy)}</div>
        <div class="field"><label>Se reparte</label>${respSelect('rent-resp', rent.responsibility)}</div>
        <div class="field small"><button class="btn" id="rent-save">Guardar</button></div>
      </div>
      ${hasPrev ? `<div style="margin-top:10px;"><button class="btn ghost" id="copy-prev">Copiar alquiler y servicios del mes anterior</button></div>` : ''}
    </div>

    <div class="form-card">
      <h3>Agregar servicio</h3>
      <div class="form-row">
        <div class="field"><label>Servicio</label>
          <select id="svc-select">${SERVICIOS_PREDEFINIDOS.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>
        </div>
        <div class="field wide" id="svc-other-wrap" style="display:none;"><label>Nombre del servicio</label><input type="text" id="svc-other" placeholder="Especificar…"></div>
        <div class="field"><label>Monto</label><input type="number" min="0" step="0.01" id="svc-amount" placeholder="0"></div>
        <div class="field"><label>Pagó</label>${paidBySelect('svc-paidby','yo')}</div>
        <div class="field"><label>Se reparte</label>${respSelect('svc-resp','50-50')}</div>
        <div class="field small"><button class="btn" id="svc-add">Agregar</button></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Servicio</th><th>Monto</th><th>Pagó</th><th>Reparto</th><th></th></tr></thead>
        <tbody>
          ${services.length ? services.map(s=>{
            if(editSvcId===s.id){
              const isPre = SERVICIOS_PREDEFINIDOS.includes(s.name);
              return `<tr class="edit-row"><td colspan="5">
                <div class="form-row">
                  <div class="field"><label>Servicio</label>
                    <select id="svc-edit-select">${SERVICIOS_PREDEFINIDOS.map(o=>`<option value="${o}" ${o===(isPre?s.name:'Otro')?'selected':''}>${o}</option>`).join('')}</select>
                  </div>
                  <div class="field wide" id="svc-edit-other-wrap" style="display:${isPre?'none':'flex'};"><label>Nombre</label><input type="text" id="svc-edit-other" value="${escapeHtml(isPre?'':s.name)}"></div>
                  <div class="field"><label>Monto</label><input type="number" min="0" step="0.01" id="svc-edit-amount" value="${s.amount}"></div>
                  <div class="field"><label>Pagó</label>${paidBySelect('svc-edit-paidby', s.paidBy)}</div>
                  <div class="field"><label>Se reparte</label>${respSelect('svc-edit-resp', s.responsibility)}</div>
                  <div class="field small"><button class="btn" id="svc-edit-save">Guardar</button></div>
                  <div class="field small"><button class="btn ghost" id="svc-edit-cancel">Cancelar</button></div>
                </div>
              </td></tr>`;
            }
            return `
            <tr>
              <td>${escapeHtml(s.name)}</td>
              <td class="amt-cell">${formatMoney(s.amount)}</td>
              <td>${escapeHtml(state.config[s.paidBy])}</td>
              <td><span class="tag ${respTagClass(s.responsibility)}">${respLabel(s.responsibility)}</span></td>
              <td class="row-actions"><button class="btn ghost" data-edit-svc="${s.id}">Editar</button><button class="btn danger-ghost" data-del-svc="${s.id}">Eliminar</button></td>
            </tr>`;
          }).join('') : `<tr><td colspan="5" class="empty-note">Sin servicios cargados este mes.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
  bindMonthBar(renderAlquiler);

  document.getElementById('svc-select').onchange = (e)=>{
    document.getElementById('svc-other-wrap').style.display = e.target.value==='Otro' ? 'flex' : 'none';
  };
  const svcEditSelect = document.getElementById('svc-edit-select');
  if(svcEditSelect) svcEditSelect.onchange = (e)=>{
    document.getElementById('svc-edit-other-wrap').style.display = e.target.value==='Otro' ? 'flex' : 'none';
  };

  document.getElementById('rent-save').onclick = ()=>{
    const amount = parseFloat(document.getElementById('rent-amount').value);
    if(!amount || amount<=0){ showToast('Ingresá un monto válido para el alquiler.'); return; }
    state.rentByMonth[currentMonth] = {
      amount,
      paidBy: document.getElementById('rent-paidby').value,
      responsibility: document.getElementById('rent-resp').value,
      updatedAt: now()
    };
    saveKey('rentByMonth');
    showToast('Alquiler guardado.');
    renderAlquiler();
  };

  const copyBtn = document.getElementById('copy-prev');
  if(copyBtn) copyBtn.onclick = ()=>{
    if(state.rentByMonth[prevMonth]) state.rentByMonth[currentMonth] = {...state.rentByMonth[prevMonth], updatedAt: now()};
    if(state.servicesByMonth[prevMonth]) state.servicesByMonth[currentMonth] = state.servicesByMonth[prevMonth].filter(s=>!s.deleted).map(s=>({...s, id:uid(), updatedAt: now()}));
    saveKey('rentByMonth'); saveKey('servicesByMonth');
    showToast('Copiado del mes anterior.');
    renderAlquiler();
  };

  document.getElementById('svc-add').onclick = ()=>{
    const sel = document.getElementById('svc-select').value;
    const name = sel==='Otro' ? document.getElementById('svc-other').value.trim() : sel;
    const amount = parseFloat(document.getElementById('svc-amount').value);
    if(!name){ showToast('Ingresá el nombre del servicio.'); return; }
    if(!amount || amount<=0){ showToast('Ingresá un monto válido.'); return; }
    if(!state.servicesByMonth[currentMonth]) state.servicesByMonth[currentMonth] = [];
    state.servicesByMonth[currentMonth].push({
      id: uid(), name, amount,
      paidBy: document.getElementById('svc-paidby').value,
      responsibility: document.getElementById('svc-resp').value,
      updatedAt: now()
    });
    saveKey('servicesByMonth');
    renderAlquiler();
  };

  el.querySelectorAll('[data-edit-svc]').forEach(btn=>{
    btn.onclick = ()=>{ editSvcId = btn.dataset.editSvc; renderAlquiler(); };
  });
  const svcEditCancel = document.getElementById('svc-edit-cancel');
  if(svcEditCancel) svcEditCancel.onclick = ()=>{ editSvcId=null; renderAlquiler(); };
  const svcEditSave = document.getElementById('svc-edit-save');
  if(svcEditSave) svcEditSave.onclick = ()=>{
    const sel = document.getElementById('svc-edit-select').value;
    const name = sel==='Otro' ? document.getElementById('svc-edit-other').value.trim() : sel;
    const amount = parseFloat(document.getElementById('svc-edit-amount').value);
    if(!name){ showToast('Ingresá el nombre del servicio.'); return; }
    if(!amount || amount<=0){ showToast('Ingresá un monto válido.'); return; }
    const list = state.servicesByMonth[currentMonth]||[];
    const item = list.find(x=>x.id===editSvcId);
    item.name = name; item.amount = amount;
    item.paidBy = document.getElementById('svc-edit-paidby').value;
    item.responsibility = document.getElementById('svc-edit-resp').value;
    item.updatedAt = now();
    saveKey('servicesByMonth');
    editSvcId = null;
    showToast('Servicio actualizado.');
    renderAlquiler();
  };

  el.querySelectorAll('[data-del-svc]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.delSvc;
      const item = (state.servicesByMonth[currentMonth]||[]).find(s=>s.id===id);
      if(item){ item.deleted = true; item.updatedAt = now(); }
      saveKey('servicesByMonth');
      renderAlquiler();
    };
  });
}

    if(!amount || amount<=0){ showToast('Ingresá un monto válido.'); return; }

      id:uid(), date, amount,
      paidBy: document.getElementById('clean-paidby').value,
      responsibility: document.getElementById('clean-resp').value,
      updatedAt: now()
    });
    saveKey('cleaning');
    if(date.slice(0,7)!==currentMonth) currentMonth = date.slice(0,7);
    renderLimpieza();

  el.querySelectorAll('[data-edit-clean]').forEach(btn=>{
    btn.onclick = ()=>{ editCleanId = btn.dataset.editClean; renderLimpieza(); };
  });
  const cleanEditCancel = document.getElementById('clean-edit-cancel');
  if(cleanEditCancel) cleanEditCancel.onclick = ()=>{ editCleanId=null; renderLimpieza(); };
  const cleanEditSave = document.getElementById('clean-edit-save');
  if(cleanEditSave) cleanEditSave.onclick = ()=>{
    const date = document.getElementById('clean-edit-date').value;
