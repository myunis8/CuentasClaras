                  <div class="field"><label>Parte 100% de ${escapeHtml(state.config.hermano)}</label><input type="number" min="0" step="0.01" id="gro-edit-ded-hermano" value="${dedHermano}"></div>
                  <div class="field small"><button class="btn" id="gro-edit-save">Guardar</button></div>
                  <div class="field small"><button class="btn ghost" id="gro-edit-cancel">Cancelar</button></div>
                </div>
              </td></tr>`;
            }
            const dedTags = `${dedYo>0?`<br><span class="tag resp-yo">-${formatMoney(dedYo)} 100% ${escapeHtml(state.config.yo)}</span>`:''}${dedHermano>0?`<br><span class="tag resp-hermano">-${formatMoney(dedHermano)} 100% ${escapeHtml(state.config.hermano)}</span>`:''}`;
            return `
            <tr>
              <td>${g.date}</td>
              <td>${escapeHtml(g.description||'—')}</td>
              <td class="amt-cell">${formatMoney(g.total)}${dedTags}</td>
              <td>${escapeHtml(state.config[g.paidBy])}</td>
              <td><span class="tag ${respTagClass(g.responsibility)}">${respLabel(g.responsibility)}${(dedYo>0||dedHermano>0)?' (resto)':''}</span></td>
              <td class="row-actions"><button class="btn ghost" data-edit-gro="${g.id}">Editar</button><button class="btn danger-ghost" data-del-gro="${g.id}">Eliminar</button></td>
            </tr>`;
          }).join('') : `<tr><td colspan="6" class="empty-note">Sin compras de supermercado este mes.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
  bindMonthBar(renderSuper);

  document.getElementById('gro-add').onclick = ()=>{
    const date = document.getElementById('gro-date').value;
    const amount = parseFloat(document.getElementById('gro-amount').value);
    if(!date){ showToast('Elegí una fecha.'); return; }
    if(!amount || amount<=0){ showToast('Ingresá un total válido.'); return; }
    const dedYo = parseFloat(document.getElementById('gro-ded-yo').value) || 0;
    const dedHermano = parseFloat(document.getElementById('gro-ded-hermano').value) || 0;
    if(dedYo<0 || dedHermano<0){ showToast('Los montos no pueden ser negativos.'); return; }
    if(dedYo+dedHermano>amount){ showToast('Las partes descontadas no pueden superar el total del ticket.'); return; }
    state.groceries.push({
      id:uid(), date,
      description: document.getElementById('gro-desc').value.trim(),
      total: amount,
      paidBy: document.getElementById('gro-paidby').value,
      responsibility: document.getElementById('gro-resp').value,
      dedYo, dedHermano,
      updatedAt: now()
    });
    saveKey('groceries');
    if(date.slice(0,7)!==currentMonth) currentMonth = date.slice(0,7);
    renderSuper();
  };

  el.querySelectorAll('[data-edit-gro]').forEach(btn=>{
    btn.onclick = ()=>{ editGroId = btn.dataset.editGro; renderSuper(); };
  });
  const groEditCancel = document.getElementById('gro-edit-cancel');
  if(groEditCancel) groEditCancel.onclick = ()=>{ editGroId=null; renderSuper(); };
  const groEditSave = document.getElementById('gro-edit-save');
  if(groEditSave) groEditSave.onclick = ()=>{
    const date = document.getElementById('gro-edit-date').value;
    const amount = parseFloat(document.getElementById('gro-edit-amount').value);
    if(!date){ showToast('Elegí una fecha.'); return; }
    if(!amount || amount<=0){ showToast('Ingresá un total válido.'); return; }
    const dedYo = parseFloat(document.getElementById('gro-edit-ded-yo').value) || 0;
    const dedHermano = parseFloat(document.getElementById('gro-edit-ded-hermano').value) || 0;
    if(dedYo+dedHermano>amount){ showToast('Las partes descontadas no pueden superar el total del ticket.'); return; }
    const item = state.groceries.find(x=>x.id===editGroId);
    item.date = date; item.total = amount;
    item.description = document.getElementById('gro-edit-desc').value.trim();
    item.paidBy = document.getElementById('gro-edit-paidby').value;
    item.responsibility = document.getElementById('gro-edit-resp').value;
    item.dedYo = dedYo; item.dedHermano = dedHermano;
    item.updatedAt = now();
    saveKey('groceries');
    editGroId = null;
    showToast('Ticket actualizado.');
    renderSuper();
  };

  el.querySelectorAll('[data-del-gro]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = state.groceries.find(g=>g.id===btn.dataset.delGro);
      if(item){ item.deleted = true; item.updatedAt = now(); }
      saveKey('groceries');
      renderSuper();
    };
  });
}

/* ===================== TARJETA DE CRÉDITO ===================== */
function renderTarjeta(){
  const el = document.getElementById('view-tarjeta');
  ciStartSelected = currentMonth;
  adPeriodMonthSelected = currentMonth;
  rateMonthSelected = currentMonth;
  if(!stmtItems.length) stmtMonthSelected = currentMonth; // no tocar si hay una revisión de importación en curso

  const monthItems = cardItemsForMonth(currentMonth);
  const hasUnknownRate = monthItems.some(i=>i.noRate);
  const importedItems = (state.cardCharges||[]).filter(c=>!c.deleted && c.date.slice(0,7)===currentMonth);
  const importedTotal = importedItems.reduce((a,m)=>a+Number(m.amount),0);
  const monthTotal = monthItems.reduce((a,i)=>a+i.arsAmt,0) + importedTotal;

  const forecastMonths = Array.from({length:6},(_,i)=> addMonths(currentMonth,i));
  const rows = [];
  state.cardInstallments.filter(ci=>!ci.deleted).forEach(ci=>{
    const cells = forecastMonths.map(mk=>{
      const months = getInstallmentMonths(ci);
      const idx = months.indexOf(mk);
      if(idx<0) return `<span class="empty">—</span>`;
      const nativeAmt = Number(ci.totalAmount)/Number(ci.numInstallments);
      const currency = ci.currency||'ARS';
      const conv = toARS(nativeAmt, currency, mk);
      return forecastCellHtml(nativeAmt, currency, conv, `${idx+1}/${ci.numInstallments}`);
    });
    rows.push({ label: ci.description, tagResp: typeToResp(ci.type), cells });
  });
  state.cardAutodebits.filter(a=>a.active && !a.deleted).forEach(a=>{
    const cells = forecastMonths.map(mk=>{
      const period = currentPeriodFor(a.periods, mk);
      if(!period) return `<span class="empty">—</span>`;
      const currency = period.currency||'ARS';
      const conv = toARS(period.amount, currency, mk);
      return forecastCellHtml(Number(period.amount), currency, conv, null);
    });
    rows.push({ label: a.description, tagResp: typeToResp(a.type), cells });
  });
  const totalCells = forecastMonths.map(mk=>{
    const t = cardItemsForMonth(mk).reduce((a,i)=>a+i.arsAmt,0);
    return `<strong>${formatMoney(t)}</strong>`;
  });

  el.innerHTML = `
    <p class="section-hint">Es tu tarjeta: vos la pagás siempre. Definís qué parte le corresponde a cada uno, y podés ver mes a mes cómo van venciendo las cuotas.</p>

    <div class="card" style="margin-bottom:20px;">
      <h3>Vas a pagar en ${formatMonth(currentMonth)}</h3>
      <div class="stat-val" style="font-size:22px;">${formatMoney(monthTotal)}</div>
      ${hasUnknownRate ? `<span class="tag warn" style="margin-top:8px;">Hay consumos en USD sin cotización cargada — el monto puede subestimarse</span>` : ''}
    </div>

    <div class="table-wrap">
      <h3 style="padding:12px 0 0 4px;font-family:var(--font-display);">Cargos sueltos importados del resumen — ${formatMonth(currentMonth)}</h3>
      <p class="section-hint" style="padding:0 4px;">Consumos e impuestos del resumen que no son cuotas. Las cuotas detectadas ya aparecen arriba, en la vista mensual, proyectadas a futuro.</p>
      <table>
        <thead><tr><th>Descripción</th><th>Pesos</th><th>Dólares</th><th>Reparto</th><th></th></tr></thead>
        <tbody>
          ${importedItems.length ? importedItems.map(m=>`
            <tr>
              <td>${escapeHtml(m.description)}</td>
              <td class="amt-cell">${m.currency==='USD' ? formatMoney(m.amount)+' <span class="usd-native">(≈)</span>' : formatMoney(m.amount)}</td>
              <td class="amt-cell">${m.currency==='USD' ? formatUsd(m.nativeAmount) : '—'}</td>
              <td><span class="tag ${respTagClass(m.responsibility)}">${respLabel(m.responsibility)}</span></td>
              <td class="row-actions"><button class="btn danger-ghost" data-del-imported="${m.id}">Eliminar</button></td>
            </tr>`).join('') : `<tr><td colspan="5" class="empty-note">Todavía no importaste ningún resumen para este mes.</td></tr>`}
        </tbody>
        ${importedItems.length ? `<tfoot><tr>
          <td><strong>Total</strong></td>
          <td><strong>${formatMoney(importedItems.filter(m=>m.currency!=='USD').reduce((a,m)=>a+Number(m.amount),0))}</strong></td>
          <td><strong>${formatUsd(importedItems.filter(m=>m.currency==='USD').reduce((a,m)=>a+Number(m.nativeAmount||0),0))}</strong></td>
          <td colspan="2"></td>
        </tr></tfoot>` : ''}
      </table>
    </div>

    <div class="table-wrap">
      <h3 style="padding:12px 0 0 4px;font-family:var(--font-display);">Vista mensual — próximos 6 meses</h3>
      <table>
        <thead><tr><th>Concepto</th>${forecastMonths.map(mk=>`<th>${formatMonthShort(mk)}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.length ? rows.map(r=>`
            <tr>
              <td>${escapeHtml(r.label)}<br><span class="tag ${respTagClass(r.tagResp)}">${respLabel(r.tagResp)}</span></td>
              ${r.cells.map(c=>`<td class="forecast-cell">${c}</td>`).join('')}
            </tr>`).join('') : `<tr><td colspan="${1+forecastMonths.length}" class="empty-note">Todavía no cargaste cuotas ni débitos automáticos.</td></tr>`}
        </tbody>
        ${rows.length ? `<tfoot><tr><td>Total tarjeta</td>${totalCells.map(c=>`<td class="forecast-cell">${c}</td>`).join('')}</tr></tfoot>` : ''}
      </table>
    </div>

    <div class="form-card">
      <h3>Cotización del dólar</h3>
      <p class="section-hint">Cargala cuando la sepas (por ejemplo, al momento del resumen). Mientras no esté cargada, se usa la última cotización conocida como estimación.</p>
      <div class="form-row">
        <div class="field"><label>Mes</label><button type="button" class="btn secondary" id="rate-month-btn">${formatMonth(rateMonthSelected)} ▾</button></div>
        <div class="field"><label>Cotización (ARS por USD)</label><input type="number" min="0" step="0.01" id="rate-value" placeholder="Ej: 1250" value="${(state.exchangeRates[rateMonthSelected] && !state.exchangeRates[rateMonthSelected].deleted) ? state.exchangeRates[rateMonthSelected].value : ''}"></div>
        <div class="field small"><button class="btn" id="rate-save">Guardar</button></div>
      </div>
      ${Object.entries(state.exchangeRates).filter(([,v])=>v && !v.deleted).length ? `
        <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;">
          ${Object.entries(state.exchangeRates).filter(([,v])=>v && !v.deleted).sort((a,b)=>a[0].localeCompare(b[0])).map(([mk,entry])=>`
            <span class="tag resp-5050">${formatMonthShort(mk)}: $${entry.value} <button class="btn danger-ghost" style="padding:0 0 0 4px;" data-del-rate="${mk}">✕</button></span>
          `).join('')}
        </div>` : ''}
    </div>

    <div class="form-card">
      <h3>Importar resumen de tarjeta</h3>
      <p class="section-hint">Pasame el resumen (foto, PDF o texto) acá en el chat — yo lo leo y te devuelvo una lista lista para pegar acá abajo, una línea por concepto con este formato:<br>
      <code style="font-size:12px;">Descripción | Monto | Moneda</code><br>
      Ejemplo: <code style="font-size:12px;">MERPAGO*MEXX (cuota 3/6) | 28644,83 | ARS</code>. La moneda es opcional (si no la ponés, asume ARS).</p>
      <div class="form-row">
        <div class="field wide"><label>Pegá acá la lista de conceptos</label>
          <textarea id="stmt-text" rows="6" placeholder="MERPAGO*MEXX (cuota 3/6) | 28644,83 | ARS&#10;Claude.ai Subscr | 20 | USD&#10;IIBB Percepción | 59,26 | ARS" style="width:100%;font-family:var(--font-mono);font-size:12.5px;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="field small"><button class="btn" id="stmt-extract">Cargar lista</button></div>
      </div>

      ${stmtItems.length ? `
        <div style="margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;">
          <div class="form-row">
            <div class="field"><label>Mes del resumen</label><button type="button" class="btn secondary" id="stmt-month-btn">${formatMonth(stmtMonthSelected)} ▾</button></div>
            <div class="field"><label>Total debitado de la cuenta (ARS)</label><input type="number" min="0" step="0.01" id="stmt-total" value="${stmtTotalDebited}" placeholder="Ej: 350000"></div>
          </div>
          <p class="section-hint" style="margin-top:10px;">Marcá "Es cuota" en los consumos financiados y completá nº de cuota / total de cuotas — así se proyectan solas a los meses siguientes en vez de quedar como un cargo suelto.</p>
          <div class="table-wrap" style="margin-top:6px;">
            <table>
              <thead><tr><th>Incluir</th><th>Descripción</th><th>Pesos</th><th>Dólares</th><th>Es cuota</th><th>Nº / Total</th><th>Tipo</th></tr></thead>
              <tbody>
                ${stmtItems.map((it,idx)=>`
                  <tr>
                    <td><input type="checkbox" data-stmt-check="${idx}" ${it.include!==false?'checked':''}></td>
                    <td><input type="text" data-stmt-desc="${idx}" value="${escapeHtml(it.description)}" style="width:100%;min-width:160px;"></td>
                    <td><input type="number" step="0.01" data-stmt-ars="${idx}" value="${it.currency==='ARS'?it.amount:''}" placeholder="—" style="width:105px;"></td>
                    <td><input type="number" step="0.01" data-stmt-usd="${idx}" value="${it.currency==='USD'?it.amount:''}" placeholder="—" style="width:90px;"></td>
                    <td style="text-align:center;"><input type="checkbox" data-stmt-iscuota="${idx}" ${it.isCuota?'checked':''}></td>
                    <td>
                      <input type="number" min="1" step="1" data-stmt-cuotaidx="${idx}" value="${it.cuotaIdx||''}" placeholder="Nº" style="width:50px;">
                      /
                      <input type="number" min="1" step="1" data-stmt-cuotatotal="${idx}" value="${it.cuotaTotal||''}" placeholder="Tot" style="width:50px;">
                    </td>
                    <td>${typeSelect('stmt-type-'+idx, it.type||'compartido')}</td>
                  </tr>`).join('')}
              </tbody>
              <tfoot><tr>
                <td colspan="2"><strong>Total (para chequear contra el resumen)</strong></td>
                <td><strong id="stmt-total-ars-preview"></strong></td>
                <td><strong id="stmt-total-usd-preview"></strong></td>
                <td colspan="3"></td>
              </tr></tfoot>
            </table>
          </div>
          <div class="form-row" style="margin-top:12px;">
            <button class="btn" id="stmt-confirm">Calcular cotización e importar</button>
            <button class="btn ghost" id="stmt-cancel">Descartar</button>
          </div>
        </div>
      ` : ''}
      <div id="stmt-status" style="margin-top:10px;font-size:13px;${stmtErrorMsg?'color:var(--danger);':'color:var(--ink-soft);'}">${stmtErrorMsg ? escapeHtml(stmtErrorMsg) : ''}</div>
    </div>

    <div class="form-card">
      <h3>Nueva compra en cuotas</h3>
      <div class="form-row">
        <div class="field wide"><label>Descripción</label><input type="text" id="ci-desc" placeholder="Ej: Heladera, notebook…"></div>
        <div class="field"><label>Monto total</label><input type="number" min="0" step="0.01" id="ci-total" placeholder="0"></div>
        <div class="field small"><label>Moneda</label>${currencySelect('ci-currency','ARS')}</div>
        <div class="field small"><label>Cuotas</label><input type="number" min="1" step="1" id="ci-count" placeholder="1"></div>
        <div class="field"><label>Mes de inicio</label><button type="button" class="btn secondary" id="ci-start-btn">${formatMonth(ciStartSelected)} ▾</button></div>
        <div class="field"><label>Tipo</label>${typeSelect('ci-type','compartido')}</div>
        <div class="field small"><button class="btn" id="ci-add">Agregar</button></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Descripción</th><th>Cuota</th><th>Cuota actual</th><th>Tipo</th><th></th></tr></thead>
        <tbody>
          ${state.cardInstallments.filter(ci=>!ci.deleted).length ? state.cardInstallments.filter(ci=>!ci.deleted).map(ci=>{
            const months = getInstallmentMonths(ci);
            const idx = months.indexOf(currentMonth);
            const status = idx>=0 ? `${idx+1} / ${ci.numInstallments}` : (currentMonth < ci.startMonth ? 'aún no empieza' : 'finalizada');
            const nativeAmt = Number(ci.totalAmount)/Number(ci.numInstallments);
            return `<tr>
              <td>${escapeHtml(ci.description)}</td>
              <td class="amt-cell">${ci.currency==='USD' ? formatUsd(nativeAmt)+'<br><span class="usd-native">'+formatMoney(toARS(nativeAmt,'USD',currentMonth).value)+'</span>' : formatMoney(nativeAmt)}</td>
              <td class="installment-progress">${status}</td>
              <td><span class="tag ${respTagClass(typeToResp(ci.type))}">${respLabel(typeToResp(ci.type))}</span></td>
              <td class="row-actions"><button class="btn danger-ghost" data-del-ci="${ci.id}">Eliminar</button></td>
            </tr>`;
          }).join('') : `<tr><td colspan="5" class="empty-note">Sin compras en cuotas cargadas.</td></tr>`}
        </tbody>
      </table>
    </div>

    <div class="form-card">
      <h3>Débito automático (seguros, suscripciones, etc.)</h3>
      <div class="form-row">
        <div class="field wide"><label>Descripción</label><input type="text" id="ad-desc" placeholder="Ej: Seguro auto, seguro hogar…"></div>
        <div class="field"><label>Monto mensual</label><input type="number" min="0" step="0.01" id="ad-amount" placeholder="0"></div>
        <div class="field small"><label>Moneda</label>${currencySelect('ad-currency','ARS')}</div>
        <div class="field"><label>Tipo</label>${typeSelect('ad-type','compartido')}</div>
        <div class="field small"><button class="btn" id="ad-add">Agregar</button></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Descripción</th><th>Monto vigente</th><th>Tipo</th><th>Activo</th><th></th></tr></thead>
        <tbody id="ad-tbody">
          ${state.cardAutodebits.filter(a=>!a.deleted).length ? state.cardAutodebits.filter(a=>!a.deleted).map(a=>{
            const period = currentPeriodFor(a.periods, currentMonth);
            const nativeAmt = period ? Number(period.amount) : 0;
            const currency = period ? (period.currency||'ARS') : 'ARS';
            const rows2 = [`<tr>
              <td>${escapeHtml(a.description)}</td>
              <td class="amt-cell">${currency==='USD' ? formatUsd(nativeAmt)+'<br><span class="usd-native">'+formatMoney(toARS(nativeAmt,'USD',currentMonth).value)+'</span>' : formatMoney(nativeAmt)}</td>
              <td><span class="tag ${respTagClass(typeToResp(a.type))}">${respLabel(typeToResp(a.type))}</span></td>
              <td><label class="toggle"><input type="checkbox" data-toggle-ad="${a.id}" ${a.active?'checked':''}> ${a.active?'Sí':'No'}</label></td>
              <td class="row-actions">
                <button class="btn ghost" data-edit-ad="${a.id}">Actualizar valor</button>
                <button class="btn danger-ghost" data-del-ad="${a.id}">Eliminar</button>
              </td>
            </tr>`];
            if(adEditingId===a.id){
              rows2.push(`<tr class="edit-row"><td colspan="5">
                <div class="form-row">
                  <div class="field"><label>Nuevo monto</label><input type="number" min="0" step="0.01" id="ad-edit-amount" value="${nativeAmt}"></div>
                  <div class="field small"><label>Moneda</label>${currencySelect('ad-edit-currency', currency)}</div>
                  <div class="field"><label>Vigente desde</label><button type="button" class="btn secondary" id="ad-edit-month-btn">${formatMonth(adPeriodMonthSelected)} ▾</button></div>
                  <div class="field small"><button class="btn" id="ad-edit-save">Guardar</button></div>
                  <div class="field small"><button class="btn ghost" id="ad-edit-cancel">Cancelar</button></div>
                </div>
              </td></tr>`);
            }
            return rows2.join('');
          }).join('') : `<tr><td colspan="5" class="empty-note">Sin débitos automáticos cargados.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;

  // cotización
  document.getElementById('rate-month-btn').onclick = (e)=>{
    openMonthPicker(e.currentTarget, rateMonthSelected, (key)=>{
      rateMonthSelected = key;
      renderTarjeta();
    });
  };
  document.getElementById('rate-save').onclick = ()=>{
    const val = parseFloat(document.getElementById('rate-value').value);
    if(!val || val<=0){ showToast('Ingresá una cotización válida.'); return; }
    state.exchangeRates[rateMonthSelected] = { value: val, updatedAt: now() };
    saveKey('exchangeRates');
    showToast('Cotización guardada.');
    renderTarjeta();
  };
  el.querySelectorAll('[data-del-rate]').forEach(btn=>{
    btn.onclick = ()=>{
      const mk = btn.dataset.delRate;
      if(state.exchangeRates[mk]){ state.exchangeRates[mk].deleted = true; state.exchangeRates[mk].updatedAt = now(); }
      saveKey('exchangeRates');
      renderTarjeta();
    };
  });

  // importar resumen (parseo local del texto pegado)
  function recalcStmtTotals(){
    const arsEl = document.getElementById('stmt-total-ars-preview');
    const usdEl = document.getElementById('stmt-total-usd-preview');
    if(!arsEl || !usdEl) return;
    let sumArs=0, sumUsd=0;
    stmtItems.forEach((it,idx)=>{
      const chk = document.querySelector(`[data-stmt-check="${idx}"]`);
      if(chk && !chk.checked) return;
      const arsInput = document.querySelector(`[data-stmt-ars="${idx}"]`);
      const usdInput = document.querySelector(`[data-stmt-usd="${idx}"]`);
      const arsVal = arsInput ? parseFloat(arsInput.value)||0 : 0;
      const usdVal = usdInput ? parseFloat(usdInput.value)||0 : 0;
      sumArs += arsVal; sumUsd += usdVal;
    });
    arsEl.textContent = formatMoney(sumArs);
    usdEl.textContent = formatUsd(sumUsd);
  }
  if(stmtItems.length){
    recalcStmtTotals();
    el.querySelectorAll('[data-stmt-ars], [data-stmt-usd], [data-stmt-check]').forEach(input=>{
      input.addEventListener('input', recalcStmtTotals);
      input.addEventListener('change', recalcStmtTotals);
    });
  }
  document.getElementById('stmt-extract').onclick = ()=>{
    const text = document.getElementById('stmt-text').value.trim();
    if(!text){ showToast('Pegá la lista de conceptos primero.'); return; }
    stmtErrorMsg = '';
    const { items, skipped } = parseStatementLines(text);
    if(!items.length){
      stmtErrorMsg = 'No se reconoció ningún renglón. Revisá que cada línea tenga el formato Descripción | Monto | Moneda.';
      renderTarjeta();
      return;
    }
    stmtItems = items.map(it=>{
      const cuota = parseCuotaInfo(it.description);
      return {
        ...it, type:'compartido',
        description: cuota ? cuota.cleanDesc : it.description,
        isCuota: !!cuota,
        cuotaIdx: cuota ? cuota.idx : '',
        cuotaTotal: cuota ? cuota.total : ''
      };
    });
    if(!stmtTotalDebited) stmtTotalDebited = '';
    showToast(`Se cargaron ${items.length} conceptos${skipped.length ? ` (se ignoraron ${skipped.length} líneas sin formato reconocido)` : ''}. Revisalos antes de importar.`);
    renderTarjeta();
  };

  const stmtMonthBtn = document.getElementById('stmt-month-btn');
  if(stmtMonthBtn) stmtMonthBtn.onclick = (e)=>{
    openMonthPicker(e.currentTarget, stmtMonthSelected, (key)=>{ stmtMonthSelected = key; renderTarjeta(); });
  };
  const stmtCancel = document.getElementById('stmt-cancel');
  if(stmtCancel) stmtCancel.onclick = ()=>{ stmtItems=[]; stmtTotalDebited=''; stmtErrorMsg=''; renderTarjeta(); };

  const stmtConfirm = document.getElementById('stmt-confirm');
  if(stmtConfirm) stmtConfirm.onclick = ()=>{
    const stmtTotalVal = parseFloat(document.getElementById('stmt-total').value) || 0;
    const checked = [];
    stmtItems.forEach((it,idx)=>{
      const chk = document.querySelector(`[data-stmt-check="${idx}"]`);
      if(!chk || !chk.checked) return;
      const description = document.querySelector(`[data-stmt-desc="${idx}"]`).value.trim() || 'Consumo';
      const arsVal = parseFloat(document.querySelector(`[data-stmt-ars="${idx}"]`).value) || 0;
      const usdVal = parseFloat(document.querySelector(`[data-stmt-usd="${idx}"]`).value) || 0;
      const currency = usdVal>0 ? 'USD' : 'ARS';
      const amount = usdVal>0 ? usdVal : arsVal;
      const type = document.getElementById('stmt-type-'+idx).value;
      const isCuota = document.querySelector(`[data-stmt-iscuota="${idx}"]`).checked;
      const cuotaIdx = parseInt(document.querySelector(`[data-stmt-cuotaidx="${idx}"]`).value) || 0;
      const cuotaTotal = parseInt(document.querySelector(`[data-stmt-cuotatotal="${idx}"]`).value) || 0;
      if(amount>0) checked.push({ description, amount, currency, type, isCuota, cuotaIdx, cuotaTotal });
    });
    if(!checked.length){ showToast('Marcá al menos un concepto para importar (con un monto en pesos o dólares).'); return; }

    const sumArsExtracted = checked.filter(i=>i.currency==='ARS').reduce((a,i)=>a+i.amount,0);
    const sumUsdExtracted = checked.filter(i=>i.currency==='USD').reduce((a,i)=>a+i.amount,0);
    const existing = nativeCardAmountsForMonth(stmtMonthSelected);
    const totalArsKnown = sumArsExtracted + existing.sumArs;
    const totalUsdNative = sumUsdExtracted + existing.sumUsd;

    let rate = null;
    if(stmtTotalVal>0 && totalUsdNative>0){
      const computed = (stmtTotalVal - totalArsKnown) / totalUsdNative;
      if(computed>0){
        rate = Math.round(computed*100)/100;
        state.exchangeRates[stmtMonthSelected] = { value: rate, updatedAt: now() };
        saveKey('exchangeRates');
      } else {
        showToast('El total no alcanza a cubrir los montos en pesos conocidos — revisá los datos. Se importaron los conceptos sin actualizar la cotización.');
      }
    }
    const fallbackRate = rate ? {rate, estimated:false} : getRateForMonth(stmtMonthSelected);

    let newInstallments = 0, matchedInstallments = 0, charges = 0;
    checked.forEach(it=>{
      if(it.isCuota && it.cuotaIdx>=1 && it.cuotaTotal>=1 && it.cuotaIdx<=it.cuotaTotal){
        const cleanDesc = it.description;
        const existingCi = findMatchingInstallment(cleanDesc, it.cuotaTotal, stmtMonthSelected, it.cuotaIdx);
        if(existingCi){
          matchedInstallments++; // ya estaba cargada por un resumen anterior: no se duplica
          return;
        }
        state.cardInstallments.push({
          id: uid(), description: cleanDesc,
          totalAmount: it.amount * it.cuotaTotal, numInstallments: it.cuotaTotal,
          startMonth: addMonths(stmtMonthSelected, -(it.cuotaIdx-1)),
          currency: it.currency, type: it.type, updatedAt: now()
        });
        newInstallments++;
        return;
      }
      let arsAmount;
      if(it.currency==='ARS') arsAmount = it.amount;
      else arsAmount = fallbackRate ? it.amount*fallbackRate.rate : 0;
      state.cardCharges.push({
        id:uid(), date:`${stmtMonthSelected}-01`, description: it.description,
        amount:arsAmount, currency: it.currency, nativeAmount: it.amount,
        paidBy:'yo', responsibility: typeToResp(it.type), updatedAt: now()
      });
      charges++;
    });
    saveKey('cardInstallments');
    saveKey('cardCharges');
    let msg = [];
    if(newInstallments) msg.push(`${newInstallments} cuota(s) nueva(s)`);
    if(matchedInstallments) msg.push(`${matchedInstallments} cuota(s) ya cargada(s) (no se duplicaron)`);
    if(charges) msg.push(`${charges} cargo(s) suelto(s)`);
    showToast(`Importado: ${msg.join(', ')}${rate?` — cotización estimada: $${rate}`:''}.`);
    stmtItems = [];
    stmtTotalDebited = '';
    if(stmtMonthSelected!==currentMonth) currentMonth = stmtMonthSelected;
    renderTarjeta();
  };

  el.querySelectorAll('[data-del-imported]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = (state.cardCharges||[]).find(c=>c.id===btn.dataset.delImported);
      if(item){ item.deleted = true; item.updatedAt = now(); }
      saveKey('cardCharges');
      renderTarjeta();
    };
  });

  // cuotas
  document.getElementById('ci-start-btn').onclick = (e)=>{
    openMonthPicker(e.currentTarget, ciStartSelected, (key)=>{
      ciStartSelected = key;
      document.getElementById('ci-start-btn').textContent = formatMonth(ciStartSelected) + ' ▾';
    });
  };
  document.getElementById('ci-add').onclick = ()=>{
    const description = document.getElementById('ci-desc').value.trim();
    const totalAmount = parseFloat(document.getElementById('ci-total').value);
    const numInstallments = parseInt(document.getElementById('ci-count').value);
    if(!description){ showToast('Ingresá una descripción.'); return; }
    if(!totalAmount || totalAmount<=0){ showToast('Ingresá un monto total válido.'); return; }
    if(!numInstallments || numInstallments<=0){ showToast('Ingresá una cantidad de cuotas válida.'); return; }
    state.cardInstallments.push({
      id:uid(), description, totalAmount, numInstallments, startMonth:ciStartSelected,
      currency: document.getElementById('ci-currency').value,
      type: document.getElementById('ci-type').value,
      updatedAt: now()
    });
    saveKey('cardInstallments');
    renderTarjeta();
  };
  el.querySelectorAll('[data-del-ci]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = state.cardInstallments.find(ci=>ci.id===btn.dataset.delCi);
      if(item){ item.deleted = true; item.updatedAt = now(); }
      saveKey('cardInstallments');
      renderTarjeta();
    };
  });

  // débitos automáticos
  document.getElementById('ad-add').onclick = ()=>{
    const description = document.getElementById('ad-desc').value.trim();
    const amount = parseFloat(document.getElementById('ad-amount').value);
    if(!description){ showToast('Ingresá una descripción.'); return; }
    if(!amount || amount<=0){ showToast('Ingresá un monto válido.'); return; }
    state.cardAutodebits.push({
      id:uid(), description, type: document.getElementById('ad-type').value, active:true,
      periods:[{ startMonth: currentMonth, amount, currency: document.getElementById('ad-currency').value }],
      updatedAt: now()
    });
    saveKey('cardAutodebits');
    renderTarjeta();
  };
  el.querySelectorAll('[data-toggle-ad]').forEach(chk=>{
    chk.onchange = ()=>{
      const a = state.cardAutodebits.find(x=>x.id===chk.dataset.toggleAd);
      a.active = chk.checked;
      a.updatedAt = now();
      saveKey('cardAutodebits');
      renderTarjeta();
    };
  });
  el.querySelectorAll('[data-del-ad]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = state.cardAutodebits.find(a=>a.id===btn.dataset.delAd);
      if(item){ item.deleted = true; item.updatedAt = now(); }
      saveKey('cardAutodebits');
      renderTarjeta();
    };
  });
  el.querySelectorAll('[data-edit-ad]').forEach(btn=>{
    btn.onclick = ()=>{
      adEditingId = (adEditingId===btn.dataset.editAd) ? null : btn.dataset.editAd;
      adPeriodMonthSelected = addMonths(currentMonth,0);
      renderTarjeta();
    };
  });
  const editMonthBtn = document.getElementById('ad-edit-month-btn');
  if(editMonthBtn) editMonthBtn.onclick = (e)=>{
    openMonthPicker(e.currentTarget, adPeriodMonthSelected, (key)=>{
      adPeriodMonthSelected = key;
      document.getElementById('ad-edit-month-btn').textContent = formatMonth(adPeriodMonthSelected) + ' ▾';
    });
  };
  const editCancel = document.getElementById('ad-edit-cancel');
  if(editCancel) editCancel.onclick = ()=>{ adEditingId=null; renderTarjeta(); };
  const editSave = document.getElementById('ad-edit-save');
  if(editSave) editSave.onclick = ()=>{
    const newAmount = parseFloat(document.getElementById('ad-edit-amount').value);
    if(!newAmount || newAmount<=0){ showToast('Ingresá un monto válido.'); return; }
    const a = state.cardAutodebits.find(x=>x.id===adEditingId);
    a.periods = a.periods.filter(p=>p.startMonth!==adPeriodMonthSelected);
    a.periods.push({ startMonth: adPeriodMonthSelected, amount:newAmount, currency: document.getElementById('ad-edit-currency').value });
    a.updatedAt = now();
    saveKey('cardAutodebits');
    adEditingId = null;
    showToast('Valor actualizado.');
    renderTarjeta();
  };
}
function forecastCellHtml(nativeAmt, currency, conv, progressLabel){
  const prog = progressLabel ? `<div style="font-size:10px;color:var(--ink-soft);">${progressLabel}</div>` : '';
  if(currency==='USD'){
    const note = conv.noRate ? `<div style="font-size:10px;color:var(--danger);">sin cotización</div>`
               : conv.estimated ? `<div style="font-size:10px;color:var(--accent-2);">≈ estimado</div>` : '';
    return `${prog}<div>${formatUsd(nativeAmt)}</div><div style="font-size:11px;color:var(--ink-soft);">${formatMoney(conv.value)}</div>${note}`;
  }
  return `${prog}${formatMoney(conv.value)}`;
}

  document.getElementById('cfg-import-btn').onclick = ()=> document.getElementById('cfg-import-file').click();
  document.getElementById('cfg-import-file').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const data = JSON.parse(reader.result);
        STORAGE_KEYS.forEach(key=>{
          if(data[key]!==undefined) state[key] = data[key];
        });
        migrateAutodebits();
        migrateExchangeRates();
        migrateCardCharges();
        await persistForce();
        showToast('Datos restaurados.');
        render();
      }catch(err){
        showToast('El archivo no es válido.');
      }
    };
    reader.readAsText(file);
  };

  document.getElementById('cfg-reset').onclick = ()=>{
    if(!confirm('¿Seguro que querés borrar todos los datos? Esta acción no se puede deshacer.')) return;
    state = { config: state.config, rentByMonth:{}, servicesByMonth:{}, cleaning:[], groceries:[], cardInstallments:[], cardAutodebits:[], monthlyExpenses:[], exchangeRates:{}, settlements:[], cardCharges:[] };
    persistForce();
    showToast('Datos borrados.');
    render();
    currentView = 'config';
    renderViews();
  };
}

/* ===================== INIT ===================== */
(async function init(){
  await loadAll();
  render();
  // Mientras la pestaña esté abierta, trae cambios del otro cada 45s en segundo plano.
  // No vuelve a dibujar la pantalla (para no borrarte algo que estés escribiendo);
  // los datos frescos se ven al cambiar de pestaña o al tocar "Sincronizar".
  setInterval(async ()=>{
    if(!githubConfigured()) return;
    try{ await syncPull(); }catch(e){ /* si falla el polling, no interrumpe el uso normal */ }
  }, 45000);
})();
</script>
